[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
# Optional: materialize LFS on Railway checkout before docker build (ignored if git-lfs missing)
buildCommand = "command -v git-lfs >/dev/null 2>&1 && git lfs install && git lfs pull || true"

[deploy]
healthcheckPath = "/health"
restartPolicyType = "ON_FAILURE"
